apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-router-code
data:
  main.py: |
    import http.server
    import json

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_POST(self):
            self.send_response(200)
            self.send_header('Content-type', 'application/json')
            self.end_headers()
            # Always return decision: "coding" to test the route
            self.wfile.write(json.dumps({"decision": "coding"}).encode())

    print("Starting mock semantic router on port 8080...")
    http.server.HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-semantic-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-semantic-router
  template:
    metadata:
      labels:
        app: mock-semantic-router
    spec:
      containers:
      - name: server
        image: python:3.9-alpine
        command: ["python", "/app/main.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: mock-router-code
---
apiVersion: v1
kind: Service
metadata:
  name: mock-semantic-router
spec:
  selector:
    app: mock-semantic-router
  ports:
  - port: 8080
    targetPort: 8080
